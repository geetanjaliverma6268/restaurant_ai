<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant AI 🍕</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            padding: 30px 0;
        }

        .header h1 { font-size: 2.5em; }
        .header p { font-size: 1.1em; opacity: 0.9; margin-top: 8px; }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #764ba2;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .menu-item {
            background: #f8f4ff;
            border: 2px solid #e0d0ff;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .menu-item:hover {
            background: #764ba2;
            color: white;
            border-color: #764ba2;
            transform: translateY(-2px);
        }

        .menu-item .name { font-weight: bold; font-size: 1em; }
        .menu-item .price { color: #888; font-size: 0.9em; margin-top: 4px; }
        .menu-item:hover .price { color: #e0d0ff; }

        .order-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0d0ff;
            border-radius: 12px;
            font-size: 1em;
            resize: none;
            height: 100px;
            font-family: inherit;
            outline: none;
            transition: border 0.2s;
        }

        .order-input:focus { border-color: #764ba2; }

        /* Voice Button */
        .voice-section {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
        }

        .mic-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
            flex-shrink: 0;
        }

        .mic-btn:hover { transform: scale(1.1); }
        
        .mic-btn.recording {
            background: linear-gradient(135deg, #fc5c7d, #6a3093);
            animation: recording-pulse 1s infinite;
        }

        @keyframes recording-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 4px 15px rgba(252,92,125,0.4); }
            50% { transform: scale(1.1); box-shadow: 0 4px 25px rgba(252,92,125,0.7); }
        }

        .voice-status {
            flex: 1;
            padding: 12px;
            background: #f8f4ff;
            border-radius: 12px;
            color: #764ba2;
            font-size: 0.95em;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            transition: transform 0.2s;
        }

        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .response-card {
            display: none;
            background: #f0fff4;
            border: 2px solid #68d391;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .response-card h2 { color: #276749; margin-bottom: 15px; }

        .order-items { list-style: none; }
        .order-items li {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #c6f6d5;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            font-weight: bold;
            font-size: 1.2em;
            color: #276749;
        }

        .ai-message {
            background: #e6ffed;
            border-radius: 10px;
            padding: 12px;
            margin-top: 12px;
            color: #276749;
            font-style: italic;
        }

        .loading {
            text-align: center;
            color: #764ba2;
            padding: 20px;
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0d0ff;
            border-top: 4px solid #764ba2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .order-id-badge {
            background: #764ba2;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            float: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍕 Restaurant AI</h1>
            <p>Type karो ya bolke order dijiye!</p>
        </div>

        <!-- Menu -->
        <div class="card">
            <h2>📋 Hamara Menu</h2>
            <div class="menu-grid" id="menuGrid"></div>
        </div>

        <!-- Order -->
        <div class="card">
            <h2>🛒 Order Dijiye</h2>
            
            <!-- Voice Section -->
            <div class="voice-section">
                <button class="mic-btn" id="micBtn" onclick="toggleVoice()">🎤</button>
                <div class="voice-status" id="voiceStatus">
                    🎤 Mic button dabao aur bolke order do!
                </div>
            </div>

            <textarea 
                class="order-input" 
                id="orderInput"
                placeholder="Ya yahan type karo... jaise: 'ek burger aur do cold drink chahiye'"
            ></textarea>
            <button class="btn" id="orderBtn" onclick="placeOrder()">
                🚀 Order Karo
            </button>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>AI aapka order process kar raha hai...</p>
        </div>

        <!-- Response -->
        <div class="response-card" id="responseCard">
            <h2>✅ Order Confirm! <span class="order-id-badge" id="orderIdBadge"></span></h2>
            <ul class="order-items" id="orderItems"></ul>
            <div class="total-row">
                <span>Total</span>
                <span id="orderTotal"></span>
            </div>
            <div class="ai-message" id="aiMessage"></div>
        </div>
    </div>

    <script>
        const API = "https://restaurantai-production-a470.up.railway.app";
        let isRecording = false;
        let recognition = null;

        // Voice setup
        function setupVoice() {
            if('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.lang = 'hi-IN';
                recognition.continuous = false;
                recognition.interimResults = true;

                recognition.onstart = () => {
                    document.getElementById('voiceStatus').textContent = '🔴 Sun raha hoon... boliye!';
                    document.getElementById('micBtn').classList.add('recording');
                    document.getElementById('micBtn').textContent = '⏹️';
                };

                recognition.onresult = (event) => {
                    let transcript = '';
                    for(let i = 0; i < event.results.length; i++) {
                        transcript += event.results[i][0].transcript;
                    }
                    document.getElementById('orderInput').value = transcript;
                    document.getElementById('voiceStatus').textContent = `✅ Suna: "${transcript}"`;
                };

                recognition.onend = () => {
                    isRecording = false;
                    document.getElementById('micBtn').classList.remove('recording');
                    document.getElementById('micBtn').textContent = '🎤';
                    document.getElementById('voiceStatus').textContent = '✅ Recording complete! Order Karo button dabao.';
                };

                recognition.onerror = (e) => {
                    document.getElementById('voiceStatus').textContent = '❌ Mic access do — browser mein allow karo!';
                    isRecording = false;
                    document.getElementById('micBtn').classList.remove('recording');
                    document.getElementById('micBtn').textContent = '🎤';
                };
            } else {
                document.getElementById('voiceStatus').textContent = '❌ Ye browser voice support nahi karta — Chrome use karo!';
                document.getElementById('micBtn').disabled = true;
            }
        }

        function toggleVoice() {
            if(!recognition) return;
            if(isRecording) {
                recognition.stop();
                isRecording = false;
            } else {
                recognition.start();
                isRecording = true;
            }
        }

        // Menu load
        async function loadMenu() {
            try {
                const res = await fetch(`${API}/menu`);
                const data = await res.json();
                const grid = document.getElementById('menuGrid');
                Object.entries(data.menu).forEach(([item, price]) => {
                    grid.innerHTML += `
                        <div class="menu-item" onclick="addToOrder('${item}')">
                            <div class="name">${item.charAt(0).toUpperCase() + item.slice(1)}</div>
                            <div class="price">Rs. ${price}</div>
                        </div>
                    `;
                });
            } catch(e) { console.log("Menu error:", e); }
        }

        function addToOrder(item) {
            const input = document.getElementById('orderInput');
            input.value = input.value ? `${input.value} aur ek ${item}` : `ek ${item} chahiye`;
        }

        async function placeOrder() {
            const text = document.getElementById('orderInput').value.trim();
            if(!text) { alert("Pehle order likho ya bolo!"); return; }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('responseCard').style.display = 'none';
            document.getElementById('orderBtn').disabled = true;

            try {
                const res = await fetch(`${API}/order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();
                showResponse(data);
            } catch(e) {
                alert("Server se connect nahi ho pa raha!");
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('orderBtn').disabled = false;
            }
        }

        function showResponse(data) {
            const card = document.getElementById('responseCard');
            const itemsList = document.getElementById('orderItems');
            const total = document.getElementById('orderTotal');
            const message = document.getElementById('aiMessage');
            const orderBadge = document.getElementById('orderIdBadge');

            itemsList.innerHTML = '';

            if(data.order_id) {
                orderBadge.textContent = `#${data.order_id}`;
            }

            if(data.order && data.order.items) {
                const prices = {
                    'burger': 120, 'pizza': 250, 'pasta': 180,
                    'cold drink': 50, 'fries': 80, 'sandwich': 100
                };
                data.order.items.forEach((item, i) => {
                    const qty = data.order.quantities[i];
                    const price = (prices[item] || 0) * qty;
                    itemsList.innerHTML += `
                        <li>
                            <span>${item} x${qty}</span>
                            <span>Rs. ${price}</span>
                        </li>
                    `;
                });
                total.textContent = `Rs. ${data.order.total}`;
                message.textContent = data.order.message;
            } else {
                message.textContent = data.message || "Order mil gaya!";
            }

            card.style.display = 'block';
            card.scrollIntoView({ behavior: 'smooth' });
        }

        setupVoice();
        loadMenu();
    </script>
</body>
</html>
